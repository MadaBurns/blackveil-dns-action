name: "Blackveil DNS Security Scanner"
description: "Scan your domain's DNS & email security configuration and enforce minimum grade in CI"
author: "MadaBurns"

branding:
  icon: "shield"
  color: "purple"

inputs:
  domain:
    description: "Domain to scan (e.g. example.com)"
    required: true
  minimum-grade:
    description: "Minimum passing grade (A+, A, B+, B, C+, C, D+, D, F)"
    required: false
    default: "C"
  profile:
    description: "Scoring profile: auto, mail_enabled, enterprise_mail, non_mail, web_only, minimal"
    required: false
    default: "auto"
  api-key:
    description: "Blackveil DNS API key for authenticated access (bypasses rate limits)"
    required: false
  endpoint:
    description: "MCP endpoint URL"
    required: false
    default: "https://dns-mcp.blackveilsecurity.com/mcp"

outputs:
  score:
    description: "Numeric score (0-100)"
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: "Letter grade (A+ through F)"
    value: ${{ steps.scan.outputs.grade }}
  maturity:
    description: "Email security maturity stage name"
    value: ${{ steps.scan.outputs.maturity }}
  passed:
    description: "'true' if grade meets minimum-grade threshold, 'false' otherwise"
    value: ${{ steps.scan.outputs.passed }}
  scoring-profile:
    description: "Scoring profile used (detected or explicit)"
    value: ${{ steps.scan.outputs.scoring-profile }}
  finding-counts:
    description: "JSON object with finding counts by severity (critical, high, medium, low)"
    value: ${{ steps.scan.outputs.finding-counts }}
  interaction-effects:
    description: "JSON array of scoring interaction penalties (ruleId, penalty, narrative)"
    value: ${{ steps.scan.outputs.interaction-effects }}
  percentile-rank:
    description: "Percentile rank within the scoring profile population (0-100). Empty when insufficient data."
    value: ${{ steps.scan.outputs.percentile-rank }}
  spoofability-score:
    description: "Composite email spoofability score (0-100, higher = more spoofable). Empty when not computed."
    value: ${{ steps.scan.outputs.spoofability-score }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "20"

    - name: Run Blackveil DNS scan
      id: scan
      shell: bash
      env:
        INPUT_DOMAIN: ${{ inputs.domain }}
        INPUT_MINIMUM_GRADE: ${{ inputs.minimum-grade }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_ENDPOINT: ${{ inputs.endpoint }}
      run: node "${{ github.action_path }}/scan.mjs"
